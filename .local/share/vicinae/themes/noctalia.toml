# Vicinae Noctalia's Theme Template

[meta]
name = "Noctalia"
description = "Theme generated by Noctalia - dark variant"
variant = "dark"
icon = "noctalia.svg"

# ============================================================================
# Core Colors
# ============================================================================

[colors.core]
accent = "#ffb4aa"
accent_foreground = "#5f150f"
background = "#181211"
foreground = "#ede0de"
secondary_background = "#251e1d"
border = "#534341"

# ============================================================================
# Window Borders
# ============================================================================

[colors.main_window]
border = "#534341"  # Softer for main app

[colors.settings_window]
border = "#a08c8a"  # Stronger but not primary (less distracting)

# ============================================================================
# Accent Palette
# ============================================================================

[colors.accents]
blue = "#ffb4aa"
green = "#dfc38c"
magenta = "#e7bdb7"
orange = { name = "#ffb4ab", lighter = 40 }
red = "#ffb4ab"
yellow = { name = "#dfc38c", lighter = 80 }
cyan = { name = "#ffb4aa", lighter = 50 }
purple = "#e7bdb7"

# ============================================================================
# Text System
# ============================================================================

[colors.text]
default = "#ede0de"
muted = "#d8c2be"
danger = "#ffb4ab"
success = "#dfc38c"
placeholder = { name = "#d8c2be", opacity = 0.6 }

[colors.text.selection]
background = "#ffb4aa"
foreground = "#5f150f"

[colors.text.links]
default = "#ffb4aa"
visited = { name = "#dfc38c", darker = 20 }

# ============================================================================
# Input Fields
# ============================================================================

[colors.input]
border = "#a08c8a"
border_focus = "#ffb4aa"
border_error = "#ffb4ab"

# ============================================================================
# Buttons
# ============================================================================

[colors.button.primary]
background = "#2f2827"
foreground = "#ede0de"

[colors.button.primary.hover]
background = "#3b3332"  

[colors.button.primary.focus]
outline = "#ffb4aa"

# ============================================================================
# Lists
# ============================================================================

[colors.list.item.hover]
background = { name = "#7d2b23", opacity = 0.25 }  
foreground = "#ede0de"

[colors.list.item.selection]
background = { name = "#7d2b23", opacity = 0.50 }
foreground = "#ffdad5"
secondary_background = "#7d2b23"
secondary_foreground = "#ffdad5"

# ============================================================================
# Grid Items
# ============================================================================

[colors.grid.item]
background = "#251e1d"

[colors.grid.item.hover]
outline = { name = "#e7bdb7", opacity = 0.8 }

[colors.grid.item.selection]
outline = { name = "#ffb4aa" }

# ============================================================================
# Scrollbars
# ============================================================================

[colors.scrollbars]
background = { name = "#ffb4aa", opacity = 0.2 }

# ============================================================================
# Loading States
# ============================================================================

[colors.loading]
bar = "#ffb4aa"
spinner = "#ffb4aa"
