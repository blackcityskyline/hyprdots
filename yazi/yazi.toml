# ~/.config/yazi/yazi.toml

[manager]
show_hidden = true          # показывать скрытые файлы (начинающиеся с точки)
show_icons = true           # отображать иконки файлов (нужен Nerd Font)
sort_by = "natural"         # сортировка с учётом чисел (файл1, файл2, файл10)
sort_dir_first = true       # папки всегда сверху

[status]
separator_open = ""        # красивые разделители (если шрифт поддерживает)
separator_close = ""

# Всё остальное (preview, plugin, adapter) оставлено по умолчанию,
# чтобы не ломать автоопределение и не вызывать предупреждений.
