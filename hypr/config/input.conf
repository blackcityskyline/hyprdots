# ===========================================
# Настройки ввода
# ===========================================

input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    # kb_options = grp:win_space_toggle
    kb_rules =
    follow_mouse = 1
    mouse_refocus = false
    float_switch_override_focus = 2
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = false          
        tap-to-click = true
        tap-and-drag = true
        drag_lock = true
        disable_while_typing = true
        middle_button_emulation = true
        scroll_factor = 0.5
    }

    numlock_by_default = true
}

gestures {
    # workspace_swipe = on
}

device {
    name = logitech-m185-1
    sensitivity = 0
    scroll_factor = 5.0    # или другое положительное значение
}
