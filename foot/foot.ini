# ~/.config/foot/foot.ini
# Tokyo Night Moon для Foot

[main]
font = JetBrainsMono Nerd Font Mono:size=14
# Для жирного и курсива можно использовать:
# bold-font = JetBrainsMono Nerd Font:style=Bold
# italic-font = JetBrainsMono Nerd Font:style=Italic
pad = 5x5

[cursor]
style = beam
blink = yes

[colors-dark]
alpha = 0.95
background = 1a1b26
foreground = c0caf5
# cursor = c0caf5ff

selection-background = 2e3a5e
selection-foreground = c0caf5

urls = 7dcfff

# 16-цветная палитра Tokyo Night Moon
regular0 = 15161e   # black
regular1 = f7768e   # red
regular2 = 9ece6a   # green
regular3 = e0af68   # yellow
regular4 = 7aa2f7   # blue
regular5 = bb9af7   # magenta
regular6 = 7dcfff   # cyan
regular7 = a9b1d6   # white

bright0 = 414868    # bright black
bright1 = f7768e    # bright red
bright2 = 9ece6a    # bright green
bright3 = e0af68    # bright yellow
bright4 = 7aa2f7    # bright blue
bright5 = bb9af7    # bright magenta
bright6 = 7dcfff    # bright cyan
bright7 = c0caf5    # bright white

[scrollback]
lines = 10000
indicator-position = fixed  # Показывать индикатор прокрутки
indicator-format = " {offset}"

[mouse]
hide-when-typing = yes

[key-bindings]
scrollback-up-page = Shift+Page_Up
scrollback-down-page = Shift+Page_Down
scrollback-up-line = Shift+Up
scrollback-down-line = Shift+Down
