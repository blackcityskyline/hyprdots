# Night Shift Configuration
# ~/.config/nightshift/config

# Температура (в Кельвинах)
DAY_TEMP=5500
NIGHT_TEMP=3300

# Время (24-часовой формат HH:MM)
DAWN_TIME="14:00"
DUSK_TIME="18:00"

# Длительность перехода (в секундах)
TRANSITION_DURATION=2700

# Координаты (раскомментировать для авто-режима)
# LAT="53.9"
# LON="27.6"
