# ===========================================
# General appearance settings
# ===========================================

general {
    gaps_in                   = 4
    gaps_out                  = 8
    border_size               = 0         # No borders, shadows only
    layout                    = dwindle
    resize_on_border          = true
    extend_border_grab_area   = 15
    col.active_border         = rgb(565f89)   # Active window border (blue-grey)
    col.inactive_border       = rgb(2E2E34)   # Inactive window border (dark grey)
    allow_tearing             = false
}

# ===========================================
# Window decorations
# ===========================================

decoration {
    rounding          = 12
    active_opacity    = 0.98
    inactive_opacity  = 0.92   # Slightly more opaque for better performance

    shadow {
        enabled      = true
        range        = 18
        render_power = 3
        color        = rgba(0, 0, 0, 0.8)
        offset       = 0 8
    }

    blur {
        enabled           = true
        size              = 3
        passes            = 1
        new_optimizations = true
        xray              = false
        ignore_opacity    = false
        noise             = 0
        contrast          = 1.0
        brightness        = 1.0
        vibrancy          = 0.1
        vibrancy_darkness = 0.2
        popups            = true
        popups_ignorealpha = 0.6
    }

    dim_inactive  = true
    dim_strength  = 0.08   # Inactive window dimming
    dim_special   = 0.3    # Special workspace dimming
    dim_around    = 0.5    # Fullscreen surround dimming
}

# ===========================================
# Animations
# ===========================================

animations {
    enabled = yes

    # Bezier curves
    bezier = smooth,   0.4,  0.0, 0.2, 1.0
    bezier = overshot, 0.13, 0.99, 0.29, 1.0

    # Border animations (disabled for performance)
    animation = border,      0
    animation = borderangle, 0

    # Layer animations
    animation = layers,    1, 2, smooth
    animation = layersIn,  1, 2, smooth
    animation = layersOut, 1, 2, smooth

    # Window animations
    animation = windows,     1, 3, smooth, popin 95%
    animation = windowsIn,   1, 2, smooth
    animation = windowsOut,  1, 2, smooth
    animation = windowsMove, 1, 2, smooth

    # Fade animations
    animation = fade,       1, 3, smooth
    animation = fadeIn,     1, 2, smooth
    animation = fadeOut,    1, 2, smooth
    animation = fadeSwitch, 0             # Disabled for performance
    animation = fadeShadow, 1, 2, smooth
    animation = fadeDim,    1, 2, smooth
    animation = fadeLayers, 1, 2, smooth

    # Workspace animations
    animation = workspaces,          1, 3, smooth, slide
    animation = workspacesIn,        1, 2, smooth
    animation = workspacesOut,       1, 2, smooth
    animation = specialWorkspace,    1, 3, overshot, slidevert
    animation = specialWorkspaceIn,  1, 2, smooth
    animation = specialWorkspaceOut, 1, 2, smooth
}

# ===========================================
# Layout settings
# ===========================================

dwindle {
    pseudotile                   = true
    preserve_split               = true
    smart_split                  = false   # Disabled for performance
    smart_resizing               = true
    permanent_direction_override = false
    special_scale_factor         = 0.96
    split_width_multiplier       = 1.2
    use_active_for_splits        = true
    force_split                  = 2
    default_split_ratio          = 1.0    # Size ratio of spawned windows
}

master {
    new_status     = master
    new_on_top     = true
    orientation    = left
    smart_resizing = true
    drop_at_cursor = false
    mfact          = 0.5
}

# ===========================================
# Window rules
# ===========================================

# Browsers — no blur/animation, opaque
windowrule = no_blur on,      match:class ^(zen|brave|firefox)$
windowrule = no_anim on,      match:class ^(zen|brave|firefox)$
windowrule = opaque on,       match:class ^(zen|brave|firefox)$

# Terminals — keep blur enabled
windowrule = no_blur off,     match:class ^(kitty|alacritty|foot)$

# Waypaper — centered float
windowrule = float on,        match:class ^(waypaper)$
windowrule = move center,     match:class ^(waypaper)$
windowrule = size 1100 750,   match:class ^(waypaper)$
windowrule = border_size 0,   match:class ^(waypaper)$
windowrule = rounding 16,     match:class ^(waypaper)$
windowrule = opacity 0.95,    match:class ^(waypaper)$
windowrule = stay_focused on, match:class ^(waypaper)$
windowrule = no_blur on,      match:class ^(waypaper)$

# File managers
windowrule = float off,       match:class ^(Thunar|pcmanfm)$
windowrule = move center,     match:class ^(Thunar|pcmanfm)$
windowrule = size 1300 850,   match:class ^(Thunar|pcmanfm)$
windowrule = rounding 14,     match:class ^(Thunar|pcmanfm)$
windowrule = opacity 0.96,    match:class ^(Thunar|pcmanfm)$
windowrule = no_blur on,      match:class ^(Thunar|pcmanfm)$

# Control panels (audio, theme settings)
windowrule = float on,        match:class ^(org.pulseaudio.pavucontrol|qt5ct|qt6ct)
windowrule = move center,     match:class ^(org.pulseaudio.pavucontrol|qt5ct|qt6ct)
windowrule = size 900 550,    match:class ^(org.pulseaudio.pavucontrol|qt5ct|qt6ct)
windowrule = rounding 12,     match:class ^(org.pulseaudio.pavucontrol|qt5ct|qt6ct)
windowrule = opaque on,       match:class ^(org.pulseaudio.pavucontrol|qt5ct|qt6ct)
windowrule = stay_focused on, match:class ^(org.pulseaudio.pavucontrol|qt5ct|qt6ct)
windowrule = no_blur on,      match:class ^(org.pulseaudio.pavucontrol|qt5ct|qt6ct)

# Network / Bluetooth
windowrule = float on,        match:class ^(com.network.manager|com.ezratweaver.AdwBluetooth)
windowrule = move center,     match:class ^(com.network.manager|com.ezratweaver.AdwBluetooth)
windowrule = size 400 330,    match:class ^(com.network.manager|com.ezratweaver.AdwBluetooth)
windowrule = rounding 12,     match:class ^(com.network.manager|com.ezratweaver.AdwBluetooth)
windowrule = opaque on,       match:class ^(com.network.manager|com.ezratweaver.AdwBluetooth)
windowrule = stay_focused off,match:class ^(com.network.manager|com.ezratweaker.AdwBluetooth)
windowrule = no_blur on,      match:class ^(com.network.manager|com.ezratweaver.AdwBluetooth)

# Messengers
windowrule = float off,       match:class ^(discord|org.telegram.desktop)
windowrule = move center,     match:class ^(discord|org.telegram.desktop)
windowrule = size 1100 750,   match:class ^(discord|org.telegram.desktop)
windowrule = rounding 12,     match:class ^(discord|org.telegram.desktop)
windowrule = opaque on,       match:class ^(discord|org.telegram.desktop)
windowrule = no_blur on,      match:class ^(discord|org.telegram.desktop)

# Floating terminals
windowrule = float on,        match:title ^(float-term|popup-term)$
windowrule = move center,     match:title ^(float-term|popup-term)$
windowrule = size 1100 650,   match:title ^(float-term|popup-term)$
windowrule = rounding 12,     match:title ^(float-term|popup-term)$
windowrule = opacity 0.94,    match:title ^(float-term|popup-term)$
windowrule = no_blur off,     match:class ^(float-term|popup-term)$

# System monitors
windowrule = float off,       match:class ^(htop|btop|nvtop|neohtop)$
windowrule = move center,     match:class ^(htop|btop|nvtop|neohtop)$
windowrule = rounding 10,     match:class ^(htop|btop|nvtop|neohtop)$
windowrule = opacity 0.94,    match:class ^(htop|btop|nvtop|neohtop)$

# Media viewers
windowrule = float on,        match:class ^(gwenview|feh|imv|mpv|vlc)
windowrule = move center,     match:class ^(gwenview|feh|imv|mpv|vlc)
windowrule = rounding 10,     match:class ^(gwenview|feh|imv|mpv|vlc)
windowrule = opaque on,       match:class ^(gwenview|feh|imv|mpv|vlc)
windowrule = no_blur on,      match:class ^(gwenview|feh|imv|mpv|vlc)

# Launchers
windowrule = float on,        match:class ^(rofi|wofi|tofi)
windowrule = move center,     match:class ^(rofi|wofi|tofi)
windowrule = rounding 12,     match:class ^(rofi|wofi|tofi)
windowrule = opacity 1,       match:class ^(rofi|wofi|tofi)
windowrule = stay_focused off,match:class ^(rofi|wofi|tofi)
windowrule = no_blur on,      match:class ^(rofi|wofi|tofi)

# Picture-in-Picture
windowrule = float on,        match:title ^(Picture-in-Picture|PiP)$
windowrule = pin on,          match:title ^(Picture-in-Picture|PiP)$
windowrule = rounding 8,      match:title ^(Picture-in-Picture|PiP)$
windowrule = opaque on,       match:title ^(Picture-in-Picture|PiP)$
windowrule = size 480 270,    match:title ^(Picture-in-Picture|PiP)$
windowrule = no_blur on,      match:class ^(Picture-in-Picture|PiP)$

# Wrapped apps (Flatpak)
windowrule = float on,        match:class ^(\..*-wrapped)$
windowrule = move center,     match:class ^(\..*-wrapped)$
windowrule = rounding 12,     match:class ^(\..*-wrapped)$
windowrule = opacity 0.98,    match:class ^(\..*-wrapped)$
windowrule = no_blur on,      match:class ^(\..*-wrapped)$

# Show Me The Key — pinned overlay, no focus
windowrule = float on,        match:class ^(showmethekey-gtk)$
windowrule = pin on,          match:class ^(showmethekey-gtk)$
windowrule = move bottom,     match:class ^(showmethekey-gtk)$
windowrule = opaque on,       match:class ^(showmethekey-gtk)$
windowrule = no_blur on,      match:class ^(showmethekey-gtk)$
windowrule = no_focus on,     match:class ^(showmethekey-gtk)$

# Kdenlive
windowrule = float off,       match:class ^(org.kde.kdenlive)$
windowrule = move center,     match:class ^(org.kde.kdenlive)$
windowrule = no_blur on,      match:class ^(org.kde.kdenlive)$
windowrule = opaque on,       match:class ^(org.kde.kdenlive)$

# Minecraft
windowrule = float on,        match:title ^(Minecraft)
windowrule = move center,     match:class ^(Minecraft)
windowrule = no_blur on,      match:class ^(Minecraft)
windowrule = opaque on,       match:class ^(Minecraft)
windowrule = immediate off,   match:class ^(Minecraft)
windowrule = no_anim on,      match:class ^(Minecraft)

# YouTube Music
windowrule = float off,       match:class ^(com.github.th_ch.youtube_music)
windowrule = no_blur on,      match:class ^(com.github.th_ch.youtube_music)
windowrule = opaque on,       match:class ^(com.github.th_ch.youtube_music)
windowrule = no_anim on,      match:class ^(com.github.th_ch.youtube_music)
windowrule = rounding 12,     match:class ^(com.github.th_ch.youtube_music)

# Generic system dialogs
windowrule = float on,        match:title ^(Bluetooth|Network|Wi-Fi|Settings|Audio)$
windowrule = center on,       match:title ^(Bluetooth|Network|Wi-Fi|Settings|Audio)$

# ===========================================
# Layer rules
# ===========================================

# Waybar — no blur
layerrule = blur off,         match:namespace ^(waybar)$
layerrule = ignore_alpha 0.2, match:namespace ^(waybar)$

# Launchers — blur on
layerrule = blur on,          match:namespace ^(rofi|wofi)
layerrule = ignore_alpha 0.2, match:namespace ^(rofi|wofi)

# Notifications — blur on
layerrule = blur on,          match:namespace ^(notifications)$
layerrule = ignore_alpha 0.3, match:namespace ^(notifications)$

# Terminal layers — blur on
layerrule = blur on,          match:namespace ^(kitty)$
layerrule = ignore_alpha 0.1, match:namespace ^(kitty)$
layerrule = blur on,          match:namespace ^(alacritty)$
layerrule = ignore_alpha 0.1, match:namespace ^(alacritty)$

# Logout dialog
layerrule = blur on,          match:namespace ^(logout_dialog)$
layerrule = ignore_alpha 0.2, match:namespace ^(logout_dialog)$
layerrule = no_anim on,       match:namespace ^(logout_dialog)$
layerrule = animation popin,  match:namespace ^(logout_dialog)$
layerrule = dim_around on,    match:namespace ^(logout_dialog)$
layerrule = xray off,         match:namespace ^(logout_dialog)$

# Swaync notification center — blur on
layerrule = match:namespace ^(swaync-control-center),        blur on
layerrule = match:namespace ^(swaync-control-center),        ignore_alpha 0.2
layerrule = match:namespace ^(swaync-notification-window),   blur off
layerrule = match:namespace ^(swaync-notification-window),   ignore_alpha 0.2

# ===========================================
# Workspaces
# ===========================================

workspace = 1, default:true
workspace = 3
workspace = special:magic,    on-created-empty:google-chrome
workspace = special:terminal, on-created-empty:$terminal
