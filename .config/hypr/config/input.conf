# ===========================================
# Input settings
# ===========================================

input {
    kb_layout  = us,ru
    kb_variant =
    kb_model   =
    kb_rules   =
    # kb_options = grp:win_space_toggle   # Alternative layout switch shortcut

    follow_mouse              = 1         # Focus follows mouse
    mouse_refocus             = false     # Don't refocus on mouse move
    float_switch_override_focus = 2       # Float window focus behavior
    sensitivity               = 0         # Raw mouse sensitivity (0 = no modification)
    accel_profile             = flat      # Disable pointer acceleration
    numlock_by_default        = true

    touchpad {
        natural_scroll           = false
        tap-to-click             = true
        tap-and-drag             = true
        drag_lock                = true
        disable_while_typing     = true
        middle_button_emulation  = true
        scroll_factor            = 0.5
    }
}

gestures {
    # workspace_swipe = on
}

# Per-device overrides
device {
    name          = logitech-m185-1
    sensitivity   = 0
    scroll_factor = 5.0
}
