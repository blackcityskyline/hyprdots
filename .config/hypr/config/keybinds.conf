# ===========================================
# Keybindings
# ===========================================

# --- Modifiers ---
$mainMod = SUPER
$altMod  = ALT CTRL

# --- Core apps ---
$terminal    = alacritty
$filemanager = pcmanfm
$browser     = zen-browser

# --- Rofi / Wofi menus ---
$menu       = ~/.config/rofi/launcher/rofi-launcher
$bluetooth  = ~/.config/rofi/network/rofi-bluetooth
$network    = ~/.config/rofi/network/rofi-network
$nightshift = ~/.config/rofi/nightshift/rofi-nightshift
$wallpicker = ~/.config/wofi/wofi-wallpaper
$find       = ~/.config/rofi/finder/rofi-finder
$clipboard  = ~/.config/rofi/clipboard/rofi-clipsnip   # Clipboard+snippets
            # ~/.config/rofi/clipboard/rofi-clipboard  # Simple clipboard

# --- Utilities / Scripts ---
$waybar        = ~/bin/waybar/wayhide
$notifications = swaync-client -t -sw
$powermenu     = ~/bin/waybar/waypower
$wallpaper     = ~/bin/others/swaybg-random
$bible         = ~/bin/others/bible
$xkblayout     = ~/bin/hypr/hyprxkblayout
$audioctl      = ~/bin/hypr/audioctl
$backlightctl  = ~/bin/hypr/backlightctl
$scr_area      = grim -g "$(slurp)" - | wl-copy   # Screenshot: selected area
$scr_full      = grim - | wl-copy                  # Screenshot: full screen

# ===========================================
# SUPER — Core bindings
# ===========================================

# Apps
bind = $mainMod, return, exec, $terminal
bind = $mainMod, E,      exec, $filemanager
bind = $mainMod, B,      exec, $browser
bind = $mainMod, T,      exec, Telegram
bind = $mainMod, D,      exec, $menu

# Desktop
bind = $mainMod, W,     exec, $wallpaper
bind = $mainMod, O,     exec, $waybar
bind = $mainMod, N,     exec, $nightshift toggle
bind = $mainMod, Space, exec, $xkblayout

# Window management
bind = $mainMod, Q, killactive
bind = $mainMod, V, togglefloating
bind = $mainMod, F, fullscreen
bind = $mainMod, P, pseudo
bind = $mainMod, C, layoutmsg, togglesplit
bind = $mainMod, G, togglegroup
bind = $mainMod, tab, changegroupactive
bind = $mainMod, KP_Home, exit

# ===========================================
# ALT — Utilities and menus
# ===========================================

bind = ALT, L, exec, hyprlock
bind = ALT, P, exec, $powermenu
bind = ALT, B, exec, $bluetooth
bind = ALT, N, exec, $network
bind = ALT, M, exec, $notifications
bind = ALT, C, exec, $clipboard
bind = ALT, S, exec, $scr_area
bind = ALT, A, exec, $scr_full
bind = ALT, W, exec, $wallpicker
bind = ALT, F, exec, $find

bind = ALT, tab,       cyclenext
bind = ALT SHIFT, tab, cyclenext, prev

# ALT+CTRL
bind = $altMod, N, exec, $nightshift config
bind = $altMod, B, exec, $bible

# ===========================================
# Focus — arrow keys + vim keys
# ===========================================

bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# ===========================================
# Resize — SUPER+CTRL + arrow keys / vim keys
# ===========================================

bind = $mainMod CTRL, left,  resizeactive, -50 0
bind = $mainMod CTRL, right, resizeactive,  50 0
bind = $mainMod CTRL, up,    resizeactive,  0 -50
bind = $mainMod CTRL, down,  resizeactive,  0  50

bind = $mainMod CTRL, H, resizeactive, -50 0
bind = $mainMod CTRL, L, resizeactive,  50 0
bind = $mainMod CTRL, K, resizeactive,  0 -50
bind = $mainMod CTRL, J, resizeactive,  0  50

# ===========================================
# Swap windows — SUPER+SHIFT + arrow/vim keys
# ===========================================

bind = $mainMod SHIFT, left,  swapnext, prev
bind = $mainMod SHIFT, right, swapnext, next
bind = $mainMod SHIFT, up,    swapnext, prev
bind = $mainMod SHIFT, down,  swapnext, next

bind = $mainMod SHIFT, H, swapnext, prev
bind = $mainMod SHIFT, L, swapnext, next
bind = $mainMod SHIFT, K, swapnext, prev
bind = $mainMod SHIFT, J, swapnext, next

# ===========================================
# Workspaces
# ===========================================

# Switch to workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $altMod, 1, movetoworkspace, 1
bind = $altMod, 2, movetoworkspace, 2
bind = $altMod, 3, movetoworkspace, 3
bind = $altMod, 4, movetoworkspace, 4
bind = $altMod, 5, movetoworkspace, 5
bind = $altMod, 6, movetoworkspace, 6
bind = $altMod, 7, movetoworkspace, 7
bind = $altMod, 8, movetoworkspace, 8
bind = $altMod, 9, movetoworkspace, 9
bind = $altMod, 0, movetoworkspace, 10

# Special workspaces
bind = $mainMod,       S,     togglespecialworkspace, magic
bind = $mainMod SHIFT, S,     movetoworkspace,        special:magic
bind = $mainMod,       grave, togglespecialworkspace, terminal
bind = $mainMod SHIFT, grave, movetoworkspace,        special:terminal

# ===========================================
# Mouse bindings
# ===========================================

bind  = $mainMod, mouse_down, workspace, e+1
bind  = $mainMod, mouse_up,   workspace, e-1
bindm = $mainMod, mouse:272,  movewindow
bindm = $mainMod, mouse:273,  resizewindow
bindm = $mainMod, R,          cyclenext    # Cycle/resize window

# ===========================================
# Media keys
# ===========================================

# Playback
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous

# Volume
bind = , XF86AudioRaiseVolume, exec, $audioctl up
bind = , XF86AudioLowerVolume, exec, $audioctl down
bind = , XF86AudioMute,        exec, $audioctl mute

# Volume — audio sink management
bind = SHIFT, XF86AudioRaiseVolume, exec, $audioctl group 1 2   # Combine devices into multi-sink
bind = SHIFT, XF86AudioLowerVolume, exec, $audioctl ungroup      # Remove multi-sink
bind = SHIFT, XF86AudioMute,        exec, $audioctl sink-next    # Switch output device

# Brightness
bind = , XF86MonBrightnessUp,   exec, $backlightctl up
bind = , XF86MonBrightnessDown, exec, $backlightctl down
bind = , XF86ScreenSaver,       exec, $backlightctl saver

# Touchpad toggle (no action assigned)
bind = , XF86TouchpadToggle, exec,
