###################
### KEYBINDINGS ###
###################

##### Variables #####

$mainMod = SUPER

# Core Apps
$terminal = ~/git/clone/alacritty-images-patched/target/release/alacritty  # kitty
$fileManager = pcmanfm
$browser = zen-browser

# Rofi Menu, Scripts
$menu = rofi -show drun -config ~/.config/rofi/launcher/launcher.rasi
$bluetooth = ~/.config/rofi/network/rofi-bluetooth.sh
$network = ~/.config/rofi/network/rofi-network.sh
$nightshift_config = ~/.config/rofi/nightshift/rofi-nightshift_config.sh
$nightshift = ~/.config/rofi/nightshift/rofi-nightshift.sh
$wallpaper_selector = ~/.config/wofi/wofi-wallpaper_selector.sh
$clipboard  = rofi -show clipboard -config ~/.config/rofi/clipboard/clipboard.rasi # Clipboard and snippets
# $HOME/.config/rofi/clipboard/rofi-clipboard.sh  # Simple Clipboard
$waybar = ~/bin/waybar/waybar_toggle.sh

# Utilities, Scripts
$notifications = swaync-client -t -sw
$powermenu = ~/bin/waybar/powermenu1.sh 
#wlogout --buttons-per-row 5
$wallpaper = ~/bin/others/random_wallpaper_wayland.sh
$bible = ~/bin/others/bible
$scr_area = grim -g "$(slurp)" - | wl-copy # Screenshot of area
$scr_full = grim - | wl-copy               # Screenshot full screen
$xkblayout = ~/bin/hypr/switchxkblayout

##### Core Bindings #####


# Launch with mainMod (base apps, scripts)
bind = $mainMod, return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, D, exec, $menu
bind = $mainMod, N, exec, $nightshift
bind = $mainMod, B, exec, $browser
bind = $mainMod, T, exec, Telegram
bind = $mainMod, W, exec, $wallpaper
bind = $mainMod, O, exec, $waybar
bind = $mainMod, Space, exec, $xkblayout

# Launch with ALT (rofi, wofi, menu, utilities etc)
bind = ALT, L, exec, hyprlock
bind = ALT, P, exec, $powermenu
bind = ALT, B, exec, $bluetooth
bind = ALT, N, exec, $network
bind = ALT, M, exec, $notifications
bind = ALT, C, exec, $clipboard
bind = ALT, S, exec, $scr_area
bind = ALT, A, exec, $scr_full
bind = ALT, W, exec, $wallpaper_selector
bind = ALT CTRL, N, exec, $nightshift_config
bind = ALT CTRL, B, exec, $bible
# bind = ALT CTRL, N, exec, ~/.config/rofi/nightshift/night-shift.sh toggle && sleep 0.3 && hyprctl keyword decoration:dim_strength $(if pgrep wlsunset >/dev/null; then echo 0.15; else echo 0.08; fi)


# Window Management
bind = $mainMod, Q, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen, 
bind = $mainMod, P, pseudo,
bind = $mainMod, C, layoutmsg, togglesplit
bind = $mainMod, KP_Home, exit

# Move Focus Management
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, j

# Workspace Management
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = ALT CTRL, 1, movetoworkspace, 1
bind = ALT CTRL, 2, movetoworkspace, 2
bind = ALT CTRL, 3, movetoworkspace, 3
bind = ALT CTRL, 4, movetoworkspace, 4
bind = ALT CTRL, 5, movetoworkspace, 5
bind = ALT CTRL, 6, movetoworkspace, 6
bind = ALT CTRL, 7, movetoworkspace, 7
bind = ALT CTRL, 8, movetoworkspace, 8
bind = ALT CTRL, 9, movetoworkspace, 9
bind = ALT CTRL, 0, movetoworkspace, 10

# Special Workspaces / Above current normal workspace
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bind = $mainMod, grave, togglespecialworkspace, terminal
bind = $mainMod SHIFT, grave, movetoworkspace, special:terminal

# Mouse Controls
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod, R, cyclenext  # resize window

# Laptop/Media Controls (Mappings from 'wev')

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = , XF86TouchpadToggle, exec, 
bind = , XF86AudioRaiseVolume, exec, ~/bin/hypr/volumectl up
bind = , XF86AudioLowerVolume, exec, ~/bin/hypr/volumectl down
bind = , XF86AudioMute, exec, ~/bin/hypr/volumectl mute
bind = SHIFT, XF86AudioRaiseVolume, exec, ~/bin/hypr/volumectl next-sink      # switch between plugged devices
bind = SHIFT, XF86AudioLowerVolume, exec, ~/bin/hypr/volumectl combine 1 2    # combine multiple devices into one multi sink
bind = SHIFT, XF86AudioMute, exec, ~/bin/hypr/volumectl uncombine             # uncombine and remove multi sink

bind = , XF86MonBrightnessUp, exec, ~/bin/hypr/backlightctl up
bind = , XF86MonBrightnessDown, exec, ~/bin/hypr/backlightctl down
bind = , XF86ScreenSaver, exec, ~/bin/hypr/backlightctl saver

# Advanced Window Management
bind = $mainMod CTRL, left, resizeactive, -50 0
bind = $mainMod CTRL, right, resizeactive, 50 0
bind = $mainMod CTRL, up, resizeactive, 0 -50
bind = $mainMod CTRL, down, resizeactive, 0 50

bind = $mainMod CTRL, H, resizeactive, -50 0
bind = $mainMod CTRL, L, resizeactive, 50 0
bind = $mainMod CTRL, K, resizeactive, 0 -50
bind = $mainMod CTRL, J, resizeactive, 0 50

bind = $mainMod SHIFT, left, swapnext, prev
bind = $mainMod SHIFT, right, swapnext, next
bind = $mainMod SHIFT, up, swapnext, prev
bind = $mainMod SHIFT, down, swapnext, next

bind = $mainMod SHIFT, h, swapnext, prev
bind = $mainMod SHIFT, l, swapnext, next
bind = $mainMod SHIFT, k, swapnext, prev
bind = $mainMod SHIFT, j, swapnext, next


bind = $mainMod, G, togglegroup,
bind = $mainMod, tab, changegroupactive,
bind = ALT, tab, cyclenext,
bind = ALT SHIFT, tab, cyclenext, prev
