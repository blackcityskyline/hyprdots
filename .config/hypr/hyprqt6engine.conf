theme {
    # Имя стиля должно совпадать с тем, что выбрано в Kvantum (обычно просто "kvantum")
    style = fusion
    # Цветовая схема – ПОЛНЫЙ путь до темного .colors файла
    color_scheme = ~/.config/qt6ct/colors/noctalia.conf
    # Ваша тема иконок (должна быть установлена)
    icon_theme = MoreWaita
    # Шрифты – по вашему желанию
    font = MesloLGLDZ Nerd Font
    font_size = 11
    font_fixed = MesloLGLDZ Nerd Font Mono
    font_fixed_size = 11
}

misc {
    single_click_activate = false
    menus_have_icons = true
    shortcuts_for_context_menus = true
}
